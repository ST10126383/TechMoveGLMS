services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "YourStrong@Pass123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sql-data:/var/opt/mssql

  webapi:
    build:
      context: .
      dockerfile: TechMoveGLMS.WebAPI/Dockerfile
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=TechMoveDB;User Id=sa;Password=YourStrong@Pass123;TrustServerCertificate=True;
    depends_on:
      - db

  web:
    build:
      context: .
      dockerfile: TechMoveGLMS/Dockerfile
    ports:
      - "5001:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - webapi

volumes:
  sql-data: